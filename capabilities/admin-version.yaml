naftiko: 1.0.0-alpha2
info:
  label: Flyte Admin API — Version
  description: 'Flyte Admin API — Version. 1 operations. Lead operation: Retrieve flyteadmin version. Self-contained Naftiko
    capability covering one Flyte business surface.'
  tags:
  - Flyte
  - Version
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FLYTE_API_KEY: FLYTE_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-version
    baseUri: http://localhost:30080
    description: Flyte Admin API — Version business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-version
      path: /api/v1/version
      operations:
      - name: getversion
        method: GET
        description: Retrieve flyteadmin version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: admin-version-rest
    port: 8080
    description: REST adapter for Flyte Admin API — Version. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v1/version
      name: api-v1-version
      description: REST surface for api-v1-version.
      operations:
      - method: GET
        name: getversion
        description: Retrieve flyteadmin version
        call: admin-version.getversion
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-version-mcp
    port: 9090
    transport: http
    description: MCP adapter for Flyte Admin API — Version. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: retrieve-flyteadmin-version
      description: Retrieve flyteadmin version
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-version.getversion
      outputParameters:
      - type: object
        mapping: $.
