    - path: /v1/api/v1/executions
      name: api-v1-executions
      description: REST surface for api-v1-executions.
      operations:
      - method: POST
        name: createexecution
        description: Create a workflow execution
        call: admin-executions.createexecution
        outputParameters:
        - type: object
          mapping: $.
