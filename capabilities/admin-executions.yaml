      path: /api/v1/executions/{id.project}/{id.domain}
      operations:
      - name: listexecutions
        method: GET
        description: List workflow executions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id.project
          in: path
          type: string
          required: true
        - name: id.domain
          in: path
          type: string
          required: true
    - name: api-v1-executions-id.project-id.domain-id.name
      path: /api/v1/executions/{id.project}/{id.domain}/{id.name}
      operations:
      - name: getexecution
        method: GET
        description: Retrieve a workflow execution
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id.project
          in: path
          type: string
          required: true
        - name: id.domain
          in: path
          type: string
          required: true
        - name: id.name
          in: path
          type: string
          required: true
      - name: terminateexecution
        method: DELETE
        description: Terminate a workflow execution
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id.project
          in: path
          type: string
          required: true
        - name: id.domain
          in: path
          type: string
          required: true
        - name: id.name
          in: path
