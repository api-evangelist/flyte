naftiko: 1.0.0-alpha2
info:
  label: Flyte Admin API — NodeExecutions
  description: 'Flyte Admin API — NodeExecutions. 1 operations. Lead operation: List node executions for a workflow execution.
    Self-contained Naftiko capability covering one Flyte business surface.'
  tags:
  - Flyte
  - NodeExecutions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FLYTE_API_KEY: FLYTE_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-nodeexecutions
    baseUri: http://localhost:30080
    description: Flyte Admin API — NodeExecutions business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-node_executions-workflow_execution_id.project-workflow_execution_id.domai
      path: /api/v1/node_executions/{workflow_execution_id.project}/{workflow_execution_id.domain}/{workflow_execution_id.name}
      operations:
      - name: listnodeexecutions
        method: GET
        description: List node executions for a workflow execution
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workflow_execution_id.project
          in: path
          type: string
          required: true
        - name: workflow_execution_id.domain
          in: path
          type: string
          required: true
        - name: workflow_execution_id.name
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: admin-nodeexecutions-rest
    port: 8080
    description: REST adapter for Flyte Admin API — NodeExecutions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v1/node-executions/{workflow-execution-id-project}/{workflow-execution-id-domain}/{workflow-execution-id-name}
      name: api-v1-node-executions-workflow-execution-id-project-workflow-execution-id-domai
      description: REST surface for api-v1-node_executions-workflow_execution_id.project-workflow_execution_id.domai.
      operations:
      - method: GET
        name: listnodeexecutions
        description: List node executions for a workflow execution
        call: admin-nodeexecutions.listnodeexecutions
        with:
          workflow_execution_id.project: rest.workflow_execution_id.project
          workflow_execution_id.domain: rest.workflow_execution_id.domain
          workflow_execution_id.name: rest.workflow_execution_id.name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-nodeexecutions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Flyte Admin API — NodeExecutions. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-node-executions-workflow-execution
      description: List node executions for a workflow execution
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-nodeexecutions.listnodeexecutions
      with:
        workflow_execution_id.project: tools.workflow_execution_id.project
        workflow_execution_id.domain: tools.workflow_execution_id.domain
        workflow_execution_id.name: tools.workflow_execution_id.name
      outputParameters:
      - type: object
        mapping: $.
