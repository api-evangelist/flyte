apis:
  - aid: flyte:flyte-admin-api
    name: Flyte Admin API
    description: >-
      The Flyte Admin API is the control-plane REST API exposed by the
      flyteadmin service. It is generated from the flyteidl protocol buffer
      definitions via gRPC-Gateway and provides JSON over HTTP access to
      the same operations exposed via gRPC. The API is used to register
      and manage projects, tasks, workflows, and launch plans, to create
      and inspect workflow, node, and task executions, to receive
      lifecycle events, to proxy data to and from upstream object stores,
      and to read and write matchable attribute overrides at the project,
      domain, and workflow levels. The same REST API powers the Flyte
      Console UI and is the primary programmatic interface for operating
      a Flyte cluster.
    humanURL: https://docs.flyte.org
    baseURL: http://localhost:30080
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
