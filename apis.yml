aid: flyte
name: Flyte
description: >-
  Flyte is a Kubernetes-native, open-source workflow orchestration platform
  for machine learning, data, and analytics pipelines. It provides
  reproducibility, type safety, strong versioning of tasks and workflows,
  and a multi-tenant control plane with native first-class scheduling on
  Kubernetes. Flyte is a Cloud Native Computing Foundation (CNCF) incubating
  project. Beyond the Python and Go SDKs, Flyte exposes a JSON-over-HTTP
  REST control-plane API (the Flyte Admin API) generated from the flyteidl
  protocol buffer definitions via gRPC-Gateway, which is used to register
  and manage projects, tasks, workflows, and launch plans, to create and
  inspect executions, to receive lifecycle events, and to read and write
  matchable attribute overrides.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
